name: Publish to RubyGems

# Publishes flexops to rubygems.org via RubyGems trusted publishing (OIDC) —
# no stored token, no MFA prompt. Triggered on vX.Y.Z tag push or manual
# workflow_dispatch.
#
# One-time setup on rubygems.org (required before the first run):
#   1. Log in to rubygems.org → gem "flexops" → Trusted Publishers →
#      Create new trusted publisher
#   2. Fill in:
#        Publisher:   GitHub Actions
#        Repository:  BillEisenman/flexops-sdk-ruby
#        Workflow:    publish.yml
#        Environment: (leave blank)
#
# Docs: https://guides.rubygems.org/trusted-publishing/

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required to mint the OIDC token GitHub → RubyGems exchanges

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build gem
        run: gem build flexops.gemspec

      - name: Configure RubyGems OIDC credentials
        uses: rubygems/configure-rubygems-credentials@main
        # Sets up ~/.gem/credentials with a short-lived token minted from
        # the GitHub OIDC claim. No GEM_HOST_API_KEY needed.

      - name: Publish (OIDC trusted publisher)
        run: gem push flexops-*.gem
