name: Publish to RubyGems

# Publish flexops gem to rubygems.org when a vX.Y.Z tag is pushed.
# Secret required:
#   RUBYGEMS_API_KEY — a RubyGems API key with push scope for the flexops gem

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build gem
        run: gem build flexops.gemspec

      - name: Publish
        run: gem push flexops-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
